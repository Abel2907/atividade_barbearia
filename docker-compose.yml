services:
  db:
    image: postgres:15
    container_name: banco-barbearia
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha-barbearia-banco
      POSTGRES_DB: barbearia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  api:
    build: .
    container_name: api-barbearia
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
        
volumes:
  postgres_data: